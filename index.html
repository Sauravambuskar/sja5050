<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>SJA Lands</title>
    <meta
      name="description"
      content="SJA Lands — Investment & client management platform. Secure onboarding, referrals, investments, payouts, and reporting."
    />
    <meta name="robots" content="index,follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://sjalands.in" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="https://sjamicrofoundation.com/assets/images/logo-dark.png"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SJA Lands" />
    <meta property="og:title" content="SJA Lands" />
    <meta
      property="og:description"
      content="SJA Lands — Investment & client management platform. Secure onboarding, referrals, investments, payouts, and reporting."
    />
    <meta property="og:url" content="https://sjalands.in" />
    <meta
      property="og:image"
      content="https://sjamicrofoundation.com/assets/images/logo-dark.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SJA Lands" />
    <meta
      name="twitter:description"
      content="SJA Lands — Investment & client management platform. Secure onboarding, referrals, investments, payouts, and reporting."
    />
    <meta
      name="twitter:image"
      content="https://sjamicrofoundation.com/assets/images/logo-dark.png"
    />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "SJA Lands",
        "url": "https://sjalands.in",
        "logo": "https://sjamicrofoundation.com/assets/images/logo-dark.png"
      }
    </script>

    <meta name="theme-color" content="#ffffff" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
